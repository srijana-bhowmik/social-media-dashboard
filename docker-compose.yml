services:
  mysql:
    image: mysql:latest
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Sri@Mysql1
      MYSQL_DATABASE: social_dashboard
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pSri@Mysql1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dashboard-network

  backend:
    build: ./backend
    container_name: backend-container
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dashboard-network

  frontend:
    build: ./frontend
    container_name: frontend-container
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - dashboard-network

volumes:
  mysql-data:

networks:
  dashboard-network:
    driver: bridge